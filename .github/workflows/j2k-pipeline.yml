name: j2k-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: j2k-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_OPTS: -Xmx5g -Dfile.encoding=UTF-8
      JAVA_TOOL_OPTIONS: -Xmx5g
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache IntelliJ Platform download
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains.intellij.idea
            .intellijPlatform
          key: ij-platform-IC-2025.2.6-${{ runner.os }}
          restore-keys: ij-platform-IC-2025.2.6-

      - name: Fetch OkHttp 3.14.9 + 4.12.0
        run: make fetch

      - name: Resolve OkHttp runtime classpath
        run: make resolve-classpath

      - name: Convert Java → Kotlin (OkHttp)
        run: make convert

      - name: Post-process (restore dropped javax.annotation imports)
        run: make postprocess

      - name: Evaluate post-processed OkHttp
        run: make evaluate

      - name: Convert + evaluate edge-case dataset
        run: make eval-edge-cases

      - name: Upload converted sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: converted
          path: |
            build/converted/
            build/postprocessed/
            build/edge-converted/
          if-no-files-found: warn

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: |
            build/diagnostics.json
            build/edge-diagnostics.json
          if-no-files-found: warn

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/report.json
            build/report.md
            build/edge-reports/
          if-no-files-found: warn

      - name: Write report to step summary
        if: always()
        run: |
          if [[ -f build/report.md ]]; then
            echo "# OkHttp 3.14.9 → Kotlin conversion" >> "$GITHUB_STEP_SUMMARY"
            cat build/report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -f build/edge-reports/report.md ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "# Edge-case dataset" >> "$GITHUB_STEP_SUMMARY"
            cat build/edge-reports/report.md >> "$GITHUB_STEP_SUMMARY"
          fi
